<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雲端授權維運索引 | Adobe · Google Workspace · Microsoft 365</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1F4EF;
    --surface:#FFFFFF;
    --ink:#161F19;
    --ink-soft:#4B564E;
    --line:#D7DED2;
    --accent:#2B3FE0;
    --accent-soft:#E7E9FB;
    --adobe:#DA1F26;
    --gws-a:#4285F4; --gws-b:#EA4335; --gws-c:#FBBC05; --gws-d:#34A853;
    --m365:#0F6CBD;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Noto Sans TC','IBM Plex Sans',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'IBM Plex Mono',ui-monospace,monospace;}
  .display{font-family:'Space Grotesk','Noto Sans TC',sans-serif;}
  a{color:inherit;}

  /* ---------- header ---------- */
  header.top{
    position:sticky; top:0; z-index:40;
    background:rgba(241,244,239,0.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .top-inner{
    max-width:1180px; margin:0 auto;
    padding:18px 24px 16px;
  }
  .eyebrow{
    font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink-soft); margin-bottom:8px; display:flex; gap:10px; align-items:center;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
  h1.display{
    font-size:26px; font-weight:700; margin:0 0 4px; letter-spacing:-.01em;
  }
  .sub{color:var(--ink-soft); font-size:14.5px; margin:0 0 16px; max-width:640px; line-height:1.6;}

  .searchbar{
    display:flex; align-items:center; gap:10px;
    background:var(--surface); border:1.5px solid var(--line);
    border-radius:11px; padding:11px 14px;
    max-width:640px;
    transition:border-color .15s, box-shadow .15s;
  }
  .searchbar:focus-within{border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-soft);}
  .searchbar .prompt{color:var(--accent); font-weight:600; font-size:14px;}
  .searchbar input{
    border:none; outline:none; flex:1; font-size:14.5px;
    background:transparent; color:var(--ink); font-family:'IBM Plex Mono',monospace;
  }
  .searchbar input::placeholder{color:#98A399;}
  .search-count{font-size:12px; color:var(--ink-soft); white-space:nowrap;}

  /* vendor chip filter row */
  .chiprow{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    border:1px solid var(--line); background:var(--surface);
    border-radius:999px; padding:6px 12px; font-size:12.5px; cursor:pointer;
    user-select:none; transition:all .15s;
  }
  .chip .sw{width:8px;height:8px;border-radius:50%;}
  .chip[data-active="true"]{border-color:var(--accent); background:var(--accent-soft); color:var(--accent);}
  .chip:hover{border-color:var(--accent);}

  /* ---------- layout ---------- */
  .wrap{max-width:1180px; margin:0 auto; padding:28px 24px 90px; display:grid; grid-template-columns:230px 1fr; gap:36px;}
  @media (max-width:860px){ .wrap{grid-template-columns:1fr;} }

  nav.rail{position:sticky; top:158px; align-self:start; max-height:calc(100vh - 180px); overflow:auto;}
  @media (max-width:860px){ nav.rail{position:static; max-height:none; margin-bottom:8px;} }
  .rail-group{margin-bottom:18px;}
  .rail-vendor{
    display:flex; align-items:center; gap:8px;
    font-weight:700; font-size:13.5px; margin-bottom:6px;
  }
  .rail-vendor .sw{width:9px;height:9px;border-radius:3px;}
  .rail-part{
    display:block; font-size:12.5px; color:var(--ink-soft);
    padding:5px 0 5px 17px; border-left:1.5px solid var(--line);
    text-decoration:none; line-height:1.4;
  }
  .rail-part.active{color:var(--accent); border-left-color:var(--accent); font-weight:600;}
  .rail-part:hover{color:var(--ink);}

  main{min-width:0;}
  section.vendor-section{margin-bottom:44px; scroll-margin-top:150px;}
  .vendor-head{
    display:flex; align-items:baseline; gap:12px; margin-bottom:4px;
    padding-bottom:14px; border-bottom:2px solid var(--ink);
  }
  .vendor-head .sw{width:13px;height:13px;border-radius:4px; flex:none;}
  .vendor-head h2{font-size:21px; margin:0;}
  .vendor-head .tag{font-size:11px; color:var(--ink-soft); margin-left:auto;}

  .part-group{margin-top:26px; scroll-margin-top:150px;}
  .part-title{
    font-size:13px; font-weight:700; color:var(--ink-soft);
    text-transform:uppercase; letter-spacing:.06em; margin:0 0 12px;
  }

  .qa-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 20px; margin-bottom:12px; position:relative;
    scroll-margin-top:150px;
  }
  .qa-card.hidden{display:none;}
  .qa-top{display:flex; align-items:flex-start; gap:12px;}
  .qa-id{
    font-size:11px; color:var(--accent); background:var(--accent-soft);
    border-radius:6px; padding:3px 7px; flex:none; margin-top:2px;
  }
  .qa-q{font-weight:700; font-size:15px; line-height:1.5; margin:0; flex:1;}
  .qa-a{font-size:14px; color:#2C362F; line-height:1.8; margin:10px 0 0 0;}
  .qa-a ul{margin:6px 0; padding-left:20px;}
  .qa-a li{margin:3px 0;}
  .qa-foot{display:flex; justify-content:flex-end; margin-top:10px;}
  .copy-btn{
    font-size:11.5px; color:var(--ink-soft); background:none; border:1px solid var(--line);
    border-radius:7px; padding:4px 9px; cursor:pointer; font-family:inherit;
    display:flex; align-items:center; gap:5px;
  }
  .copy-btn:hover{border-color:var(--accent); color:var(--accent);}
  mark{background:#FDE68A; color:inherit; border-radius:3px; padding:0 1px;}

  /* table blocks */
  .table-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:20px; margin-bottom:12px; overflow:auto; scroll-margin-top:150px;
  }
  .table-card.hidden{display:none;}
  .table-card h4{margin:0 0 12px; font-size:14.5px;}
  table{border-collapse:collapse; width:100%; font-size:13px; min-width:520px;}
  th,td{border:1px solid var(--line); padding:9px 11px; text-align:left;}
  th{background:#F6F8F4; font-weight:700; font-size:12.5px;}
  td.yes{color:#1E7F3B; font-weight:600;}
  td.no{color:#B23A2E;}

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--ink-soft);
    display:none;
  }
  .empty-state.show{display:block;}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:999px;
    font-size:13px; opacity:0; pointer-events:none; transition:all .25s;
    z-index:60;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  footer{
    max-width:1180px; margin:0 auto; padding:0 24px 50px; color:var(--ink-soft); font-size:12.5px;
  }
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="eyebrow"><span class="dot"></span>IT 維運知識庫 · 客戶自助查詢</div>
    <h1 class="display">雲端授權維運索引</h1>
    <p class="sub">Adobe Creative Cloud、Google Workspace、Microsoft 365 三大平台的帳號、授權與維運常見問答，整理成可直接搜尋、可分享連結的索引頁。</p>
    <div class="searchbar">
      <span class="prompt mono">&gt;</span>
      <input id="searchInput" type="text" placeholder="輸入關鍵字搜尋，例如：忘記密碼、DLP、續約、儲存空間…" autocomplete="off">
      <span class="search-count mono" id="searchCount"></span>
    </div>
    <div class="chiprow" id="chipRow">
      <div class="chip" data-vendor="all" data-active="true">全部平台</div>
      <div class="chip" data-vendor="adobe" data-active="false"><span class="sw" style="background:var(--adobe)"></span>Adobe Creative Cloud</div>
      <div class="chip" data-vendor="gws" data-active="false"><span class="sw" style="background:linear-gradient(90deg,var(--gws-a),var(--gws-c))"></span>Google Workspace</div>
      <div class="chip" data-vendor="m365" data-active="false"><span class="sw" style="background:var(--m365)"></span>Microsoft 365</div>
    </div>
  </div>
</header>

<div class="wrap">
  <nav class="rail" id="rail"></nav>
  <main id="main">
    <div class="empty-state" id="emptyState">找不到符合「<span id="emptyQuery"></span>」的項目，換個關鍵字試試。</div>
  </main>
</div>

<footer>本頁彙整自公司內部文件《Adobe / GWS / M365 常見問答與維運指南》，如條款或價格異動請以廠商官方公告為準。最後更新：2026 年 6 月。</footer>

<div class="toast" id="toast">已複製連結</div>

const VENDORS = [
  {
    id:'adobe', name:'Adobe Creative Cloud', color:'var(--adobe)', tag:'ADOBE CC',

        {q:'Adobe CC 要怎麼登入？', a:'使用者需先從 Adobe 官方網站下載 Creative Cloud Desktop App，安裝完成後開啟程式，輸入註冊的 Adobe ID（通常為 Email）與密碼即可登入。若為企業版本，可能採用公司網域帳號（Federated ID），需透過公司 SSO（單一登入）驗證登入。此外，首次登入可能需要 Email 驗證或雙重驗證（MFA）來確保帳號安全。'},
        {q:'忘記 Adobe 密碼怎麼辦？', a:'在登入頁面點選「忘記密碼」，輸入註冊信箱後，Adobe 會寄送重設密碼連結至信箱，依照指示設定新密碼即可。若為企業帳號，密碼通常由公司 IT 或身分驗證系統管理，需透過企業內部流程進行重設，例如 Azure AD 或其他 SSO 平台。'},

        {q:'可以離線使用嗎？', a:'Adobe Creative Cloud 軟體大多支援短期離線使用，但系統會定期要求連線驗證授權，通常每隔數天至數週需連線一次。若長時間未連線，系統可能限制軟體使用，直到重新驗證成功。'},
      ]},
      { title:'軟體安裝與訂閱合約', items:[
        {q:'Adobe 軟體在哪下載？', a:'Adobe Creative Cloud 的所有應用程式都需透過 Creative Cloud Desktop App 下載與管理。登入後即可看到完整應用程式清單，包括 Photoshop、Illustrator、Premiere Pro 等，使用者可依需求安裝、更新或移除軟體，並管理版本。'},
        {q:'安裝失敗怎麼辦？', a:'若遇到安裝失敗，建議先檢查網路是否穩定，並確認電腦有足夠儲存空間。可嘗試重新啟動電腦、關閉防毒軟體或防火牆後再安裝。若問題持續，可使用 Adobe 官方提供的 Cleaner Tool 徹底清除殘留檔，再重新安裝。'},
        {q:'Adobe CC 是買斷嗎？', a:'Adobe Creative Cloud 採訂閱制（Subscription-based），而非一次性買斷。使用者需按月或按年支付費用，訂閱期間可持續使用最新版本軟體、雲端服務及更新功能，確保工具始終維持最新狀態。'},
        {q:'訂閱到期會怎樣？', a:'當訂閱到期後，使用者將無法繼續使用 Adobe 軟體功能，但已建立的檔案（例如 PSD、AI 檔）仍會保存在本機或雲端。重新訂閱後即可再次開啟與編輯這些檔案。'},

        {q:'需要更新嗎？', a:'Adobe 會定期推出新版本與安全更新，建議保持自動更新開啟，以確保軟體穩定性與安全性。部分企業也會控管版本更新以確保內部流程一致。'},
        {q:'能用舊版本嗎？', a:'Creative Cloud 提供多個歷史版本可供下載，使用者可在 App 中選擇特定版本安裝，以確保與舊專案或外部合作夥伴版本相容。'},
      ]},
      { title:'企業管理與雲端資產', items:[
        {q:'個人版與企業版差異？', a:'個人版適合單一使用者，功能完整但無集中管理；企業版（Teams 或 Enterprise）提供 Admin Console（管理主控台），可進行帳號管理、授權分配、使用者控管、資安設定與企業級技術支援，適合公司組織使用。'},
        {q:'離職帳號如何處理？', a:'管理員可透過 Admin Console 將離職員工的授權回收並重新指派給新使用者。此外，企業版支援資料轉移功能，可保留該員工的雲端資產並交接給其他同事。'},
        {q:'有雲端空間嗎？', a:'Adobe Creative Cloud 大多數方案包含雲端儲存空間（通常為 100 GB），使用者可儲存文件、設計稿與素材，並支援跨裝置同步與分享功能。'},

        {q:'哪些版本可使用 Google Meet AI 自動筆記？', a:'Standard 與 Plus 版本可使用，Starter 版本不支援此功能。'},

// ---------- build DOM ----------
const railEl = document.getElementById('rail');
const mainEl = document.getElementById('main');
const emptyState = document.getElementById('emptyState');

function slug(s){ return s.replace(/[^\w\u4e00-\u9fa5]+/g,'-').replace(/^-+|-+$/g,''); }

let railHTML = '';
let mainHTML = '';
let counter = 0;

VENDORS.forEach(v=>{
  railHTML += `<div class="rail-group"><div class="rail-vendor"><span class="sw" style="background:${v.color}"></span>${v.name}</div>`;
  mainHTML += `<section class="vendor-section" id="v-${v.id}" data-vendor="${v.id}">
    <div class="vendor-head"><span class="sw" style="background:${v.color}"></span><h2>${v.name}</h2><span class="tag mono">${v.tag}</span></div>`;

  v.parts.forEach((p,pi)=>{
    const partId = `${v.id}-part-${pi}`;
    railHTML += `<a class="rail-part" href="#${partId}" data-target="${partId}">${p.title}</a>`;
    mainHTML += `<div class="part-group" id="${partId}"><p class="part-title">${p.title}</p>`;

    if(p.table){
      const t = p.table;
      let rows = t.rows.map(r=>{
        const cells = r.map((c,ci)=>{
          if(ci===0) return `<td>${c}</td>`;
          let cls = '';
          if(c.indexOf('✓')===0) cls=' class="yes"';
          if(c.indexOf('✕')===0) cls=' class="no"';
          return `<td${cls}>${c}</td>`;
        }).join('');
        return `<tr>${cells}</tr>`;
      }).join('');
      mainHTML += `<div class="table-card" data-vendor="${v.id}" data-search="${(t.title+' '+t.rows.map(r=>r.join(' ')).join(' ')).toLowerCase()}">
        <h4>${t.title}</h4>
        <table><thead><tr>${t.head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>
      </div>`;
    }

    if(p.items){
      p.items.forEach(item=>{
        counter++;
        const id = `${v.id}-q-${slug(item.q).slice(0,30)}-${counter}`;
        const searchText = (item.q+' '+item.a.replace(/<[^>]+>/g,' ')).toLowerCase();
        mainHTML += `<div class="qa-card" id="${id}" data-vendor="${v.id}" data-search="${searchText.replace(/"/g,'&quot;')}">
          <div class="qa-top">
            <span class="qa-id mono">${v.tag}</span>
            <p class="qa-q">${item.q}</p>
          </div>
          <div class="qa-a">${item.a}</div>
          <div class="qa-foot"><button class="copy-btn" data-id="${id}">🔗 複製連結</button></div>
        </div>`;
      });
    }
    mainHTML += `</div>`;
  });
  mainHTML += `</section>`;
  railHTML += `</div>`;
});

railEl.innerHTML = railHTML;
mainEl.insertAdjacentHTML('afterbegin', mainHTML);

// ---------- search + filter ----------
const searchInput = document.getElementById('searchInput');
const searchCount = document.getElementById('searchCount');
const emptyQuery = document.getElementById('emptyQuery');
const chipRow = document.getElementById('chipRow');
let activeVendor = 'all';

function applyFilter(){
  const q = searchInput.value.trim().toLowerCase();
  let visibleCount = 0;

  document.querySelectorAll('.qa-card, .table-card').forEach(card=>{
    const matchesVendor = activeVendor==='all' || card.dataset.vendor===activeVendor;
    const matchesQuery = q==='' || card.dataset.search.includes(q);
    const show = matchesVendor && matchesQuery;
    card.classList.toggle('hidden', !show);
    if(show) visibleCount++;

    // highlight
    const qEl = card.querySelector('.qa-q');
    if(qEl){
      const original = qEl.dataset.orig || qEl.textContent;
      qEl.dataset.orig = original;
      if(q && matchesQuery){
        const idx = original.toLowerCase().indexOf(q);
        if(idx>=0){
          qEl.innerHTML = original.slice(0,idx)+'<mark>'+original.slice(idx,idx+q.length)+'</mark>'+original.slice(idx+q.length);
        } else {
          qEl.textContent = original;
        }
      } else {
        qEl.textContent = original;
      }
    }
  });

  // collapse empty groups
  document.querySelectorAll('.part-group').forEach(g=>{
    const anyVisible = g.querySelectorAll('.qa-card:not(.hidden), .table-card:not(.hidden)').length>0;
    g.style.display = anyVisible ? '' : 'none';
  });
  document.querySelectorAll('.vendor-section').forEach(s=>{
    const anyVisible = s.querySelectorAll('.qa-card:not(.hidden), .table-card:not(.hidden)').length>0;
    s.style.display = anyVisible ? '' : 'none';
  });

  searchCount.textContent = q || activeVendor!=='all' ? `${visibleCount} 筆結果` : '';
  emptyState.classList.toggle('show', visibleCount===0);
  emptyQuery.textContent = searchInput.value.trim();
}

searchInput.addEventListener('input', applyFilter);

chipRow.querySelectorAll('.chip').forEach(chip=>{
  chip.addEventListener('click', ()=>{
    activeVendor = chip.dataset.vendor;
    chipRow.querySelectorAll('.chip').forEach(c=>c.dataset.active = (c===chip));
    applyFilter();
  });
});

// ---------- copy link ----------
const toast = document.getElementById('toast');
document.addEventListener('click', e=>{
  const btn = e.target.closest('.copy-btn');
  if(!btn) return;
  const id = btn.dataset.id;
  const url = window.location.href.split('#')[0] + '#' + id;
  navigator.clipboard?.writeText(url).catch(()=>{});
  history.replaceState(null,'','#'+id);
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 1600);
});

// ---------- active rail highlight ----------
const railLinks = Array.from(document.querySelectorAll('.rail-part'));
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    const link = railLinks.find(l=>l.dataset.target===entry.target.id);
    if(!link) return;
    if(entry.isIntersecting){
      railLinks.forEach(l=>l.classList.remove('active'));
      link.classList.add('active');
    }
  });
},{ rootMargin:'-160px 0px -70% 0px' });
document.querySelectorAll('.part-group').forEach(g=>observer.observe(g));

// open matching card if URL has hash on load
window.addEventListener('DOMContentLoaded', ()=>{
  if(location.hash){
    const el = document.querySelector(location.hash);
    if(el){ setTimeout(()=>el.scrollIntoView({behavior:'instant', block:'center'}), 50); }
  }
});
</script>
</body>
